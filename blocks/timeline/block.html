<section class="block-timeline" data-block="timeline">
    <div class="ds-container ds-container--narrow">
        <div class="timeline__head" data-if="showHead">
            <span class="ds-kicker" data-slot="kicker:text" data-optional>Historie</span>
            <h2 data-slot="title:text" data-style="heading">Vores *rejse*</h2>
        </div>
        <ol class="timeline__list">
            <li class="timeline__item" data-repeat="items" data-min="2" data-max="20">
                <span class="timeline__year" data-slot="year:text">2026</span>
                <h3 class="timeline__title" data-slot="itemTitle:text">Milepæl</h3>
                <div class="ds-muted timeline__body" data-slot="content:richtext" data-optional>
                    <p>En kort beskrivelse af milepælen.</p>
                </div>
            </li>
        </ol>
    </div>
</section>
