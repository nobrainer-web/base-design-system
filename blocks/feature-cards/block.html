<section class="block-feature-cards" data-block="feature-cards">
    <div class="ds-container">
        <div class="feature-cards__head" data-if="showHead">
            <span class="ds-kicker" data-slot="kicker:text" data-optional>Fordele</span>
            <h2 data-slot="title:text" data-style="heading">Det vi gør *bedst*</h2>
            <p class="ds-lead" data-slot="intro:text" data-optional>En kort intro til sektionen.</p>
        </div>
        <div class="feature-cards__grid">
            <article class="ds-card feature-card" data-repeat="cards" data-min="2" data-max="9">
                <div class="ds-icon-tile"><i class="ds-ico" data-lucide="zap" aria-hidden="true"></i></div>
                <h3 class="feature-card__title" data-slot="cardTitle:text">Hurtig</h3>
                <p class="ds-muted ds-small" data-slot="cardText:text">En kort beskrivelse af fordelen på et par linjer.</p>
            </article>
        </div>
    </div>
</section>
