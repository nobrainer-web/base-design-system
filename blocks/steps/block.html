<section class="block-steps" data-block="steps">
    <div class="ds-container">
        <div class="steps__head" data-if="showHead">
            <span class="ds-kicker" data-slot="kicker:text" data-optional>Sådan gør vi</span>
            <h2 data-slot="title:text" data-style="heading">Tre enkle *trin*</h2>
        </div>
        <ol class="steps__list">
            <li class="step" data-repeat="steps" data-min="2" data-max="6">
                <span class="step__num" aria-hidden="true"></span>
                <h3 class="step__title" data-slot="stepTitle:text">Trin</h3>
                <p class="ds-muted ds-small" data-slot="stepText:text">En kort beskrivelse af trinnet.</p>
            </li>
        </ol>
    </div>
</section>
