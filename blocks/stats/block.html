<section class="block-stats" data-block="stats">
    <div class="ds-container">
        <div class="stats__head" data-if="showHead">
            <span class="ds-kicker" data-slot="kicker:text" data-optional>I tal</span>
            <h2 data-slot="title:text" data-style="heading">Resultater der taler</h2>
        </div>
        <div class="stats__grid">
            <div class="stat" data-repeat="stats" data-min="2" data-max="6">
                <i class="ds-ico stat__icon" data-lucide="zap" aria-hidden="true"></i>
                <span class="stat__value" data-slot="value:text">200+</span>
                <span class="stat__label" data-slot="label:text">tilfredse kunder</span>
            </div>
        </div>
    </div>
</section>
