<section class="block-quote" data-block="quote">
    <div class="ds-container">
        <div class="quote__head" data-if="showHead">
            <span class="ds-kicker" data-slot="kicker:text" data-optional>Anmeldelser</span>
            <h2 data-slot="title:text" data-style="heading">Det siger *kunderne*</h2>
        </div>
        <div class="quote__grid">
            <figure class="ds-card quote-card" data-repeat="quotes" data-min="1" data-max="6">
                <i class="ds-ico quote-card__mark" data-lucide="quote" aria-hidden="true"></i>
                <blockquote class="quote-card__text" data-slot="text:text">Et citat fra en tilfreds kunde.</blockquote>
                <figcaption class="quote-card__author">
                    <img class="quote-card__avatar" data-slot="avatar:media" data-optional src="https://picsum.photos/seed/base-q/88/88" alt="">
                    <span>
                        <span class="quote-card__name" data-slot="name:text">Navn</span>
                        <span class="ds-tiny" data-slot="meta:text" data-optional>Titel / firma</span>
                    </span>
                </figcaption>
            </figure>
        </div>
    </div>
</section>
